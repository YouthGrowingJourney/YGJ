<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Optimization | YGJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ygj: {
              bg: '#0d0d0f',
              card: '#141417',
              anthracite: '#333333',
              gold: '#e0c280'
            }
          },
          fontFamily: {
            sans: ['Inter', 'SF Pro Display', 'system-ui', 'sans-serif']
          },
          boxShadow: {
            soft: '0 18px 45px rgba(0, 0, 0, 0.35)',
            gold: '0 0 24px rgba(224, 194, 128, 0.22)'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.umd.js"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { background: #0d0d0f; }
    .bg-grid {
      background-image: linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 34px 34px;
    }
  </style>
</head>
<body class="text-white font-sans antialiased min-h-screen bg-ygj-bg">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const { motion, AnimatePresence } = Motion;

    const sections = [
      {
        title: 'Why Sleep Matters',
        points: [
          ['Recovery', 'Cell repair, nervous system reset, and hormone balance all happen during sleep.'],
          ['Focus', 'Strong sleep sharpens attention, memory, and execution during high-pressure days.'],
          ['Testosterone', 'Consistent sleep supports healthy testosterone production and long-term vitality.'],
          ['Muscle Growth', 'Deep sleep improves protein synthesis and training adaptation.'],
          ['Mood', 'Better sleep reduces emotional volatility and improves stress tolerance.'],
          ['Discipline', 'A rested brain chooses long-term goals over short-term impulses.']
        ]
      },
      {
        title: 'Improve Falling Asleep',
        points: [
          ['Reduce Screen Time', 'Cut bright screens 60 minutes before bed to lower cognitive stimulation.'],
          ['Evening Routine', 'Use a repeatable wind-down ritual to signal shutdown mode to your brain.'],
          ['Room Temperature', 'Keep the room cool to speed up natural sleep onset.'],
          ['Avoid Light', 'Minimize artificial light to support natural melatonin release.'],
          ['Fixed Sleep Schedule', 'Sleep and wake at similar times to stabilize your circadian rhythm.']
        ]
      },
      {
        title: 'Sleep Killers',
        points: [
          ['Phone in Bed', 'Scrolling keeps your mind alert and delays deep recovery.'],
          ['Late Caffeine', 'Afternoon and evening caffeine can block restorative sleep cycles.'],
          ['Irregular Sleep', 'Chaotic bedtimes reduce sleep quality even if total hours look fine.'],
          ['Stress', 'Unprocessed stress elevates arousal and fragments night recovery.'],
          ['Poor Nutrition', 'Heavy, late, or low-quality meals can disrupt sleep architecture.']
        ]
      },
      {
        title: 'Maximize Sleep Quality',
        points: [
          ['Deep Sleep', 'Protect the first sleep cycles where physical restoration is strongest.'],
          ['Magnesium', 'Magnesium can help relaxation when used intelligently and consistently.'],
          ['Dark Room', 'Total darkness supports uninterrupted melatonin signaling.'],
          ['Consistent Routine', 'Repetition trains your biology for faster and deeper recovery.'],
          ['Daytime Movement', 'Regular training and walking improve nighttime sleep pressure.']
        ]
      },
      {
        title: 'Morning Energy',
        points: [
          ['Sunlight', 'Morning natural light anchors circadian rhythm and wakefulness.'],
          ['Drink Water', 'Hydration right after waking improves alertness and mental clarity.'],
          ['No Immediate Phone', 'Start with intention, not notifications and dopamine spikes.'],
          ['Movement', 'Light activity quickly increases blood flow and energy output.'],
          ['Wake Up Early', 'Early rising builds proactive momentum and consistency.']
        ]
      }
    ];

    function AccordionCard({ section, open, onToggle, index }) {
      return (
        <motion.section
          initial={{ opacity: 0, y: 24 }}
          animate={{ opacity: 1, y: 0 }}
          transition={{ duration: 0.45, delay: index * 0.07 }}
          className="group rounded-2xl border border-white/10 bg-ygj-card/95 backdrop-blur-sm shadow-soft hover:shadow-gold hover:border-ygj-gold/50 transition-all duration-300"
        >
          <button
            onClick={onToggle}
            className="w-full text-left px-6 md:px-8 py-6 flex items-center justify-between gap-4"
            aria-expanded={open}
          >
            <div>
              <p className="text-xs uppercase tracking-[0.24em] text-ygj-gold/80 mb-2">Category {index + 1}</p>
              <h2 className="text-xl md:text-2xl font-semibold text-white">{section.title}</h2>
            </div>
            <motion.span
              animate={{ rotate: open ? 180 : 0 }}
              transition={{ duration: 0.25 }}
              className="text-ygj-gold text-lg"
            >⌄</motion.span>
          </button>

          <AnimatePresence initial={false}>
            {open && (
              <motion.div
                initial={{ height: 0, opacity: 0 }}
                animate={{ height: 'auto', opacity: 1 }}
                exit={{ height: 0, opacity: 0 }}
                transition={{ duration: 0.35, ease: 'easeInOut' }}
                className="overflow-hidden"
              >
                <div className="px-6 md:px-8 pb-7 pt-1 border-t border-white/10 grid gap-4">
                  {section.points.map(([title, description]) => (
                    <article key={title} className="rounded-xl border border-white/8 bg-black/20 px-4 py-4 hover:border-ygj-gold/40 transition-colors duration-300">
                      <h3 className="text-base font-semibold text-ygj-gold mb-1">{title}</h3>
                      <p className="text-sm text-white/78 leading-relaxed">{description}</p>
                    </article>
                  ))}
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </motion.section>
      );
    }

    function App() {
      const [openIndex, setOpenIndex] = useState(0);

      return (
        <div className="relative overflow-hidden min-h-screen bg-grid">
          <div className="pointer-events-none absolute -top-28 -left-24 h-80 w-80 rounded-full bg-ygj-gold/10 blur-3xl" />
          <div className="pointer-events-none absolute top-1/3 -right-20 h-72 w-72 rounded-full bg-ygj-gold/10 blur-3xl" />

          <main className="relative max-w-5xl mx-auto px-4 sm:px-7 lg:px-10 py-16 md:py-20">
            <div className="flex items-start justify-between gap-4 mb-12">
              <div>
                <p className="text-ygj-gold text-xs tracking-[0.28em] uppercase mb-3">YGJ Knowledge System</p>
                <h1 className="text-4xl md:text-6xl font-bold tracking-tight">Sleep Optimization</h1>
                <p className="mt-5 text-base md:text-lg text-white/75 max-w-3xl leading-relaxed">
                  Sleep is the foundation for energy, focus, testosterone, discipline, and mental strength.
                </p>
              </div>
              <span className="shrink-0 rounded-full border border-ygj-gold/45 px-4 py-2 text-sm font-semibold text-ygj-gold shadow-gold">YGJ</span>
            </div>

            <div className="grid gap-5">
              {sections.map((section, index) => (
                <AccordionCard
                  key={section.title}
                  section={section}
                  index={index}
                  open={openIndex === index}
                  onToggle={() => setOpenIndex(openIndex === index ? -1 : index)}
                />
              ))}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
